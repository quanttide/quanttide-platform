# 量潮平台数字资产契约
# 参考：apps/qtcloud-asset/docs/add/contract.md

# ── 资产组成 ──────────────────────────────────────────

assets:
  # 架构与设计文档
  add_docs:
    title: 架构设计文档
    kind: documentation
    path: docs/add
    description: 平台架构、云服务设计、基础设施等设计文档
    subassets:
      - path: docs/add/applications # 应用设计
      - path: docs/add/cloud_services # 云服务设计
      - path: docs/add/general # 通用设计
      - path: docs/add/infra # 基础设施
      - path: docs/add/layers # 架构层次
      - path: docs/add/topics # 专题

  # 产品需求文档
  prd_docs:
    title: 产品需求文档
    kind: documentation
    path: docs/prd
    description: 产品需求规格文档

  # 根目录文档
  root_docs:
    title: 根目录文档
    kind: documentation
    path: .
    files:
      - AGENTS.md
      - CHANGELOG.md
      - README.md
      - ROADMAP.md

  # ── 应用子模块（每个都是独立资产）────────────────────

  qtadmin:
    title: 量潮管理后台
    kind: submodule
    path: apps/qtadmin
    description: 团队管理、薪酬、绩效等

  qtcloud:
    title: 量潮云
    kind: submodule
    path: apps/qtcloud
    description: 平台核心云服务

  qtcloud-data:
    title: 量潮数据云
    kind: submodule
    path: apps/qtcloud-data
    description: 数据采集、清洗、治理

  qtcloud-finance:
    title: 量潮财务云
    kind: submodule
    path: apps/qtcloud-finance
    description: 智能记账、对账、财务报表

  qtcloud-think:
    title: 量潮思考云
    kind: submodule
    path: apps/qtcloud-think
    description: 思考收集、整理、澄清

  qtcloud-write:
    title: 量潮写作
    kind: submodule
    path: apps/qtcloud-write
    description: 写作辅助、内容生成

  qtcloud-read:
    title: 量潮阅读
    kind: submodule
    path: apps/qtcloud-read
    description: 文档阅读、笔记提取

  qtcloud-agent:
    title: 量潮智能体
    kind: submodule
    path: apps/qtcloud-agent
    description: AI 智能体平台

  qtcloud-asset:
    title: 量潮数字资产云
    kind: submodule
    path: apps/qtcloud-asset
    description: 数字资产管理、契约、归档

  qtcloud-audit:
    title: 量潮审计云
    kind: submodule
    path: apps/qtcloud-audit
    description: 审计、合规、追溯

  qtcloud-code:
    title: 量潮代码云
    kind: submodule
    path: apps/qtcloud-code
    description: 代码管理、审查

  qtcloud-connect:
    title: 量潮连接云
    kind: submodule
    path: apps/qtcloud-connect
    description: 系统集成、API 网关

  qtcloud-course:
    title: 量潮课程
    kind: submodule
    path: apps/qtcloud-course
    description: 课程内容、学习路径

  qtcloud-delib:
    title: 量潮审议
    kind: submodule
    path: apps/qtcloud-delib
    description: 议题审议、决策记录

  qtcloud-infra:
    title: 量潮云基础设施
    kind: submodule
    path: apps/qtcloud-infra
    description: 基础设施、部署、运维

  qtcloud-org:
    title: 量潮组织云
    kind: submodule
    path: apps/qtcloud-org
    description: 组织架构、权限、流程

  qtcloud-product:
    title: 量潮产品云
    kind: submodule
    path: apps/qtcloud-product
    description: 产品管理、路线图

  qtcloud-support:
    title: 量潮支持云
    kind: submodule
    path: apps/qtcloud-support
    description: 客户支持、工单管理

# ── Skills ─────────────────────────────────────────────

skills:
  # 归档 Skill
  archive:
    title: 文档归档
    description: 将 journal 类文档移动到 archive 目录
    contracts:
      - name: prd_archive
        asset: prd_docs
        from: docs/prd
        to: docs/archive/prd
      - name: add_archive
        asset: add_docs
        from: docs/add
        to: docs/archive/add

  # 同步 Skill
  sync_submodules:
    title: 子模块同步
    description: 拉取并更新所有应用子模块
    command: git submodule update --init --recursive
