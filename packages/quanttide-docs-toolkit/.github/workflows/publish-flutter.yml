name: publish-flutter

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/flutter/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: k-paxian/dart-package-publisher@master
        with:
          credentialJson: ${{ secrets.PUBDEV_CREDENTIAL_JSON }}
          relativePath: packages/flutter
          force: true
          flutter: true
