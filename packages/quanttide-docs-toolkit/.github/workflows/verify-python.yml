name: ci-python

on:
  push:
    branches: [main]
    paths: ['packages/python/**']
  pull_request:
    paths: ['packages/python/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install hatchling pytest ruff
      - run: pip install -e .
      - run: ruff check .
      - run: pytest
