[project]
name = "quanttide-docs"
version = "0.4.0"
description = "量潮文档Python工具包"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "QuantTide Inc.", email = "opensource@quanttide.com" },
]
dependencies = [
    "dynaconf",
    "gitpython",
    "pyyaml",
    "markdown",
    "markdown-full-yaml-metadata",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
quanttide-docs = "quanttide_docs.cli.__main__:cli"
qtdocs = "quanttide_docs.cli.__main__:cli"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
]

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
