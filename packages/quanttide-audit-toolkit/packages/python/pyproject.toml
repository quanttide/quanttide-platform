[project]
name = "quanttide-audit"
version = "0.1.0"
description = "量潮审计工具箱（Python SDK）"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "QuantTide Inc.", email = "opensource@quanttide.com" },
]
keywords = ["quanttide", "audit", "code-quality", "lint"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]
dependencies = [
    "pydantic>=2.13.4",
    "quanttide>=0.1.1",
]

[project.urls]
Homepage = "https://github.com/quanttide/quanttide-platform"
Source = "https://github.com/quanttide/quanttide-platform"
Tracker = "https://github.com/quanttide/quanttide-platform/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quanttide_audit"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.13",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.coverage.run]
omit = ["src/quanttide_audit/__init__.py", "src/quanttide_audit/models/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests"]
addopts = "--doctest-modules"
