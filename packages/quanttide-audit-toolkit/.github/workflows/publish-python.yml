name: publish-python
on:
  release:
    types: [published]
jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/python/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install uv
        run: pip install uv
      - name: build
        run: uv build
        working-directory: packages/quanttide-audit-toolkit/packages/python
      - name: publish
        run: uv publish
        working-directory: packages/quanttide-audit-toolkit/packages/python
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
