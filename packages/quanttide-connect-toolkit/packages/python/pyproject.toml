[project]
name = "quanttide-connect"
version = "0.1.0"
description = "沟通工程工具包（Python SDK）：人机沟通模型与共识管理"
readme = "README.md"
authors = [
    { name = "Guo Zhang", email = "zhangguo@quanttide.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
]
